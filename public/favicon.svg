<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0a1b2c"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Cuadrícula de calendario (3x3) -->
  <rect x="15" y="18" width="70" height="64" rx="5" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.3"/>

  <!-- Líneas de grilla -->
  <line x1="38" y1="18" x2="38" y2="82" stroke="white" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="62" y1="18" x2="62" y2="82" stroke="white" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="15" y1="50" x2="85" y2="50" stroke="white" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Checkmarks en celdas -->
  <!-- Celda 1,1 -->
  <path d="M 20 30 L 25 35 L 33 25" fill="none" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Celda 2,1 -->
  <path d="M 43 30 L 48 35 L 56 25" fill="none" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Celda 3,1 -->
  <path d="M 67 30 L 72 35 L 80 25" fill="none" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Celda 1,2 -->
  <path d="M 20 57 L 25 62 L 33 52" fill="none" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Celda 2,2 -->
  <circle cx="50" cy="55" r="6" fill="none" stroke="#D4AF37" stroke-width="2.5"/>
  <text x="50" y="58" text-anchor="middle" fill="#D4AF37" font-size="9" font-weight="bold" font-family="sans-serif">✕</text>
  <!-- Celda 3,2 -->
  <path d="M 67 57 L 72 62 L 80 52" fill="none" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Celda 1,3 -->
  <path d="M 20 70 L 25 75 L 33 65" fill="none" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Celda 2,3 -->
  <path d="M 43 70 L 48 75 L 56 65" fill="none" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Celda 3,3 -->
  <circle cx="70" cy="66" r="6" fill="none" stroke="#D4AF37" stroke-width="2.5"/>
  <text x="70" y="69" text-anchor="middle" fill="#D4AF37" font-size="9" font-weight="bold" font-family="sans-serif">✕</text>

  <!-- Header del calendario -->
  <line x1="15" y1="30" x2="85" y2="30" stroke="white" stroke-width="1" stroke-opacity="0.15"/>
</svg>
