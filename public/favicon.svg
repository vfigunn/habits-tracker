<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo blanco opcional (puedes quitarlo si prefieres fondo transparente) -->
  <rect width="100" height="100" fill="transparent" />

  <!-- Cuadrado con bordes redondeados (stroke negro) -->
  <rect x="25" y="20" width="50" height="60" rx="12" fill="none" stroke="#111111" stroke-width="6" stroke-linejoin="round" />

  <!-- Item 1 -->
  <circle cx="38" cy="35" r="5" fill="#facc15" />
  <line x1="48" y1="35" x2="68" y2="35" stroke="#111111" stroke-width="4" stroke-linecap="round" />

  <!-- Item 2 -->
  <circle cx="38" cy="50" r="5" fill="#facc15" />
  <line x1="48" y1="50" x2="68" y2="50" stroke="#111111" stroke-width="4" stroke-linecap="round" />

  <!-- Item 3 -->
  <circle cx="38" cy="65" r="4" fill="none" stroke="#111111" stroke-width="3" />
  <line x1="48" y1="65" x2="56" y2="65" stroke="#111111" stroke-width="4" stroke-linecap="round" />

  <!-- Gran Check amarillo (sobrepone al cuadrado) -->
  <!-- Ocultar parte del borde del cuadrado debajo del check (opcional, el check lo cubre en parte) -->
  <path d="M 52 65 L 62 75 L 82 45" fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
</svg>
